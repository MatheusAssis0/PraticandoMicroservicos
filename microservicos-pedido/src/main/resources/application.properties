spring.application.name=microservicos-pedido
eureka.client.serviceUrl.defaultZone=http://discovery-server:8761/eureka
produto-service.url=http://localhost:8081
server.port=8082
spring.datasource.url=jdbc:postgresql://postgres:5432/produtos
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
management.endpoints.web.exposure.include=*
spring.cloud.openfeign.httpclient.hc5.enabled=true

resilience4j.circuitbreaker.instances.atualizaPedido.slidingWindowSize: 3
resilience4j.circuitbreaker.instances.atualizaPedido.minimumNumberOfCalls: 2
resilience4j.circuitbreaker.instances.atualizaPedido.waitDurationInOpenState: 50s

resilience4j.retry.instances.produtoService.maxAttempts=3
resilience4j.retry.instances.produtoService.waitDuration=2s